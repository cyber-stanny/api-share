name: Deploy to CloudBase

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli @cloudbase/framework-plugin-node

      - name: Login to CloudBase
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: tcb login --apiKeyId $TCB_SECRET_ID --apiKey $TCB_SECRET_KEY

      - name: Deploy
        env:
          CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_INIT_PASSWORD: ${{ secrets.ADMIN_INIT_PASSWORD }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
        run: |
          sed -i "s/{{CLOUDBASE_ENV_ID}}/$CLOUDBASE_ENV_ID/g" cloudbaserc.json
          sed -i "s/{{JWT_SECRET}}/$JWT_SECRET/g" cloudbaserc.json
          sed -i "s/{{ADMIN_INIT_PASSWORD}}/$ADMIN_INIT_PASSWORD/g" cloudbaserc.json
          sed -i "s#{{CORS_ORIGINS}}#$CORS_ORIGINS#g" cloudbaserc.json
          sed -i "s/{{SILICONFLOW_API_KEY}}/$SILICONFLOW_API_KEY/g" cloudbaserc.json
          sed -i "s/{{MIMO_API_KEY}}/$MIMO_API_KEY/g" cloudbaserc.json
          tcb framework deploy
