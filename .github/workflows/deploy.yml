name: Deploy to CloudBase

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci && npm --prefix frontend ci

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Login to CloudBase
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: tcb login --apiKeyId $TCB_SECRET_ID --apiKey $TCB_SECRET_KEY

      - name: Deploy
        env:
          CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_INIT_PASSWORD: ${{ secrets.ADMIN_INIT_PASSWORD }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          PROXY_ENABLED: ${{ secrets.PROXY_ENABLED }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npm run deploy
